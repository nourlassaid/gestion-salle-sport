<div class="overflow-x-auto mt-8 shadow-lg rounded-xl">
  <table class="min-w-full bg-white text-gray-800 text-sm rounded-xl">
    <thead class="bg-yellow-500 text-white">
      <tr>
        <th class="px-6 py-3 text-left font-semibold uppercase">Nom</th>
        <th class="px-6 py-3 text-left font-semibold uppercase">Prénom</th>
        <th class="px-6 py-3 text-left font-semibold uppercase">Téléphone</th>
        <th class="px-6 py-3 text-left font-semibold uppercase">Email</th>
        <th class="px-6 py-3 text-left font-semibold uppercase">Sexe</th>
        <th class="px-6 py-3 text-center font-semibold uppercase">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of receptionnistes" class="border-b hover:bg-yellow-50 transition">
        <td class="px-6 py-4" data-label="Nom">{{ r.nom }}</td>
        <td class="px-6 py-4" data-label="Prénom">{{ r.prenom }}</td>
        <td class="px-6 py-4" data-label="Téléphone">{{ r.telephone }}</td>
        <td class="px-6 py-4" data-label="Email">{{ r.email }}</td>
        <td class="px-6 py-4" data-label="Sexe">{{ r.sexe }}</td>
        <td class="px-6 py-4 text-center" data-label="Actions">
          <button
            (click)="delete(r.id!)"
            class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-1 rounded-md text-sm font-medium transition"
          >
            Supprimer
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
