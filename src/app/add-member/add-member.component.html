
<div class="p-6 bg-gray-100 min-h-screen">
    <div class="text-sm text-gray-500 mb-6">
      Dashboard / <span class="text-gray-900 font-medium">Add new member</span>
    </div>
  
    <div class="bg-white max-w-xl mx-auto shadow-md rounded-xl p-8">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6 border-b pb-2">ADD MEMBER</h2>
  
      <form [formGroup]="memberForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">Nom</label>
          <input type="text" formControlName="nom" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
  
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">Prénom</label>
          <input type="text" formControlName="prenom" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
  
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">Téléphone</label>
          <input type="text" formControlName="telephone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
  
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">Date d'inscription</label>
          <input type="date" formControlName="date_inscription" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
  
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">Prix</label>
          <input type="number" formControlName="prix" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
  
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
          Enregistrer
        </button>
      </form>
    </div>
  </div>
