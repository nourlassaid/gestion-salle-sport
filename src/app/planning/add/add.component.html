<div class="max-w-xl mx-auto p-6 bg-white rounded-2xl shadow-md">
  <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
    📤 Ajouter des Plannings
  </h2>

  <label
    for="file-upload"
    class="cursor-pointer flex items-center justify-center gap-2 border-2 border-dashed border-gray-300 rounded-xl py-4 px-6 bg-gray-50 hover:bg-gray-100 transition"
  >
    <span class="text-xl">📎</span>
    <span class="text-gray-700 font-medium">Sélectionner des fichiers</span>
    <input
      id="file-upload"
      type="file"
      (change)="onFileSelected($event)"
      multiple
      hidden
    />
  </label>

  <div class="mt-4" *ngIf="selectedFiles?.length">
    <p class="text-gray-700 font-medium mb-2 flex items-center gap-2">
      📂 Fichiers sélectionnés :
    </p>
    <ul class="list-disc list-inside text-gray-600 space-y-1 pl-4">
      <li *ngFor="let file of selectedFiles" class="flex items-center gap-2">
        📄 {{ file.name }}
      </li>
    </ul>
  </div>

  <button
    class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-xl disabled:opacity-50 transition"
    [disabled]="!selectedFiles?.length"
    (click)="uploadImages()"
  >
    📤 Téléverser
  </button>
</div>
