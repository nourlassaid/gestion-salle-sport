<div class="search-container">
  <input type="text" placeholder="Rechercher un membre..." [(ngModel)]="searchQuery" (input)="onSearchChange()" />
  <i class="search-icon">🔍</i> <!-- Remplaçable par une icône FontAwesome -->
</div>

<div class="members-list-container">
  <div class="header">
    
    <h2>LISTE DES ADHÉRENTS</h2>
    <div class="actions">
      <a routerLink="/members/add" class="btn-add">➕ Ajouter</a>
      <button class="btn-print" (click)="print()">🖨️ Imprimer</button>
      <button class="btn-export" (click)="exportExcel()">📥 Excel</button>
      <button class="btn-export" (click)="exportPDF()">📄 PDF</button>
    </div>
  </div>

  <div *ngFor="let month of groupedMembers | keyvalue: sortByMonth" class="monthly-section">
    <h3 class="month-title">{{ month.key }}</h3>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>N°</th>
            <th>Nom</th>
            <th>Téléphone</th>
            <th>Date d'inscription</th>
            <th>Prix</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let member of month.value; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ member.nom }} {{ member.prenom }}</td>
            <td>{{ member.telephone }}</td>
            <td>{{ member.date_inscription }}</td>
            <td>{{ member.prix }} DT</td>
            <td>
              <button class="btn-view" (click)="view(member)">Voir</button>
              <button class="btn-edit" (click)="edit(member)">Modifier</button>
              <button class="btn-delete" *ngIf="member.id !== undefined" (click)="delete(member.id!)">Supprimer</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
