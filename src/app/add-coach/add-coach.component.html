<div class="container mx-auto p-6 bg-black text-yellow-400 rounded-lg shadow-lg max-w-md mt-10">
  <h2 class="text-2xl font-bold mb-6 text-center">Ajouter un Coach</h2>

  <form [formGroup]="coachForm" (ngSubmit)="onSubmit()" class="space-y-4">

    <div>
      <label for="nom" class="block mb-1">Nom yyy:</label>
      <input
        type="text"
        id="nom"
        formControlName="nom"
        class="w-full px-4 py-2 rounded bg-yellow-100 text-black focus:outline-none"
      />
      <div *ngIf="coachForm.get('nom')?.invalid && coachForm.get('nom')?.touched" class="text-red-500 text-sm">
        Le nom est requis.
      </div>
    </div>

    <div>
      <label for="prenom" class="block mb-1">Prénom :</label>
      <input
        type="text"
        id="prenom"
        formControlName="prenom"
        class="w-full px-4 py-2 rounded bg-yellow-100 text-black focus:outline-none"
      />
      <div *ngIf="coachForm.get('prenom')?.invalid && coachForm.get('prenom')?.touched" class="text-red-500 text-sm">
        Le prénom est requis.
      </div>
    </div>

    <div>
      <label for="telephone" class="block mb-1">Téléphone :</label>
      <input
        type="tel"
        id="telephone"
        formControlName="telephone"
        class="w-full px-4 py-2 rounded bg-yellow-100 text-black focus:outline-none"
      />
      <div *ngIf="coachForm.get('telephone')?.invalid && coachForm.get('telephone')?.touched" class="text-red-500 text-sm">
        Le téléphone est requis.
      </div>
    </div>

    <div>
      <label for="specialite" class="block mb-1">Spécialité :</label>
      <input
        type="text"
        id="specialite"
        formControlName="specialite"
        class="w-full px-4 py-2 rounded bg-yellow-100 text-black focus:outline-none"
      />
      <div *ngIf="coachForm.get('specialite')?.invalid && coachForm.get('specialite')?.touched" class="text-red-500 text-sm">
        La spécialité est requise.
      </div>
    </div>

    <div>
      <label for="sexe" class="block mb-1">Sexe :</label>
      <select
        id="sexe"
        formControlName="sexe"
        class="w-full px-4 py-2 rounded bg-yellow-100 text-black focus:outline-none"
      >
        <option value="">-- Sélectionner --</option>
        <option value="Homme">Homme</option>
        <option value="Femme">Femme</option>
      </select>
      <div *ngIf="coachForm.get('sexe')?.invalid && coachForm.get('sexe')?.touched" class="text-red-500 text-sm">
        Le sexe est requis.
      </div>
    </div>

    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
      Enregistrer
    </button>
  </form>
</div>
