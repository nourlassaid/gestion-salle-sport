<div class="admin-container">
  <div class="admin-left">
    <img src="assets/gym-hero.jpg" alt="Entraîne-toi plus fort" />
  </div>

  <div class="admin-right">
    <h2 class="title">StressLess</h2>
    <p class="subtitle">
      {{ isLogin ? 'Bienvenue ! Connectez-vous à votre compte administrateur.' : 'Créez votre compte administrateur.' }}
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" formControlName="username" type="text" placeholder="admin" required />
      </div>

      <div class="form-group" *ngIf="!isLogin">
        <label for="name">Nom complet</label>
        <input id="name" formControlName="name" type="text" placeholder="Jean Dupont" />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input id="password" formControlName="password" type="password" placeholder="••••••••" required />
      </div>

      <div class="remember" *ngIf="isLogin">
        <input type="checkbox" id="remember" />
        <label for="remember">Se souvenir de moi</label>
      </div>

      <button type="submit">{{ isLogin ? 'Connexion' : 'Inscription' }}</button>
    </form>

    <p class="toggle">
      {{ isLogin ? "Vous n'avez pas de compte ?" : "Vous avez déjà un compte ?" }}
      <a href="#" (click)="toggleMode($event)">{{ isLogin ? 'Inscrivez-vous' : 'Connectez-vous' }}</a>
    </p>
  </div>
</div>
