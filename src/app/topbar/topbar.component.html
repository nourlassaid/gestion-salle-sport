<div class="topbar flex items-center justify-between bg-black text-white px-6 py-3 shadow-md sticky top-0 z-50">
  <!-- Logo -->
  <div class="logo text-2xl font-extrabold tracking-wide text-yellow-400">
    POWER GYM NEFTA
  </div>

  <!-- Zone de recherche -->
  <div class="ml-auto flex items-center gap-3">
    <input
      [(ngModel)]="searchText"
      type="text"
      placeholder="Rechercher un membre..."
      class="px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 text-black"
    />
    <button
      [routerLink]="['/search']"
      [queryParams]="{ q: searchText }"
      class="bg-yellow-400 hover:bg-yellow-300 text-black font-semibold px-4 py-2 rounded-md transition duration-200"
    >
      Rechercher
    </button>
  </div>
</div>
